<svg xmlns="http://www.w3.org/2000/svg" width="820" height="220" viewBox="0 0 820 220" role="img" aria-label="Terminal: whoami — Dinith Heshan, Data Engineer">
  <style>
    .mono { font-family: 'JetBrains Mono','SF Mono',Menlo,Consolas,monospace; font-size: 15px; }
