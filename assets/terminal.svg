  </style>
  <!-- window -->
  <rect x="10" y="10" width="800" height="200" rx="10" fill="#0f141d" stroke="#1d2634"/>
  <!-- title bar -->
  <path d="M10 20 a10 10 0 0 1 10 -10 h780 a10 10 0 0 1 10 10 v26 h-800 z" fill="#131a25"/>
  <line x1="10" y1="46" x2="810" y2="46" stroke="#1d2634"/>
  <circle cx="32" cy="28" r="5" fill="#e06c75" opacity="0.7"/>
  <circle cx="50" cy="28" r="5" fill="#ffb454" opacity="0.7"/>
  <circle cx="68" cy="28" r="5" fill="#7fd962" opacity="0.7"/>
  <text x="410" y="32" text-anchor="middle" class="mono sm dim">dinith@github: ~</text>
  <!-- session -->
  <text x="34" y="78" class="mono"><tspan class="green">dinith@github</tspan><tspan class="dim">:~$</tspan><tspan class="fog"> whoami</tspan></text>
  <text x="34" y="104" class="mono slate">Dinith Heshan — Data Engineer · Matara, Sri Lanka</text>
  <text x="34" y="134" class="mono"><tspan class="green">dinith@github</tspan><tspan class="dim">:~$</tspan><tspan class="fog"> cat focus.txt</tspan></text>
  <text x="34" y="160" class="mono slate">· distributed data pipelines   · ML systems   · cloud-native infrastructure</text>
